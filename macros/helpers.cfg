[gcode_macro _PARK_NOZZLE]
description: Park the nozzle
gcode:
    {% set client = printer["gcode_macro _CLIENT_VARIABLE"] %}
    {% set park_x = client.custom_park_x|float %}
    {% set park_y = client.custom_park_y|float %}
    {% set park_dz = client.custom_park_dz|float %}
    
    {% if "xyz" in printer.toolhead.homed_axes %}
        G91
        G1 Z{park_dz} F600
        G90
        G1 X{park_x} Y{park_y} F6000
    {% else %}
        RESPOND MSG="Axes aren't homed, parking the nozzle skipped"
    {% endif %}


[gcode_macro _PARK_WHILE_HEATING]
description: Park the nozzle while pre-heating it
gcode:
    {% set min_temp = params.TEMP|default(210)|int %}

    # Heat if needed
    {% if printer.extruder.temperature < min_temp %}
        RESPOND MSG="Heating extruder to {min_temp}º…"
        SET_HEATER_TEMPERATURE HEATER=extruder TARGET={min_temp}
        _PARK_NOZZLE
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={min_temp}
        RESPOND MSG="Extruder heated to {min_temp}º"
    {% else %}
        RESPOND MSG="Extruder already above {min_temp}º"
        _PARK_NOZZLE
    {% endif %}


[gcode_macro _PURGE_LINE]
gcode:
  RESPOND MSG="Start purge line"
  {% if printer["gcode_macro status_cleaning"] != null %}
    status_cleaning
  {% endif %}
  SAVE_GCODE_STATE NAME=Pre_Prime
  _SET_LED_GREEN

  G92 E0 ; reset extruder
  G1 Z1.0 F3000 ; move z up little to prevent scratching of surface
  G1 X2 Y25 Z0.3 F5000.0 ; move to start-line position
  G1 X2 Y275.0 Z0.3 F1500.0 E40 ; draw 1st line
  G1 X2.5 Y275.0 Z0.3 F5000.0 ; move to side a little
  G92 E0 ; reset extruder
  G1 X2.5 Y25 Z0.3 F1500.0 E40 ; draw 2nd line
  G92 E0 ; reset extruder
  #G1 E-3 F2400 ; retract
  #G92 E0 ; reset extruder
  G1 Z1.0 F3000 ; move z up little to prevent scratching of surface
  RESTORE_GCODE_STATE NAME=Pre_Prime

  {% if printer["gcode_macro status_printing"] != null %}
    status_printing
  {% endif %}

  RESPOND MSG="Purge line done"    


[gcode_macro SMARTHOME]
description: Home all axis, only if needed
gcode:
    {% if printer.toolhead.homed_axes == "xyz" %}
        RESPOND MSG="Nothing to do: all axes are already homed."
    {% else %}
        G28
    {% endif %}

[gcode_macro _DUMP_VARIABLES]
gcode:
    {% set filter_name = params.NAME|default('')|string|lower %}
    {% set filter_value = params.VALUE|default('')|string|lower %}
    {% set show_cfg = params.SHOW_CFG|default(0)|int %}
    
    {% set out = [] %}

    {% for key1 in printer %}
        {% for key2 in printer[key1] %}
            {% if (show_cfg or not (key1|lower == 'configfile' and key2|lower in ['config', 'settings'])) and (filter_name in key1|lower or filter_name in key2|lower) and filter_value in printer[key1][key2]|string|lower %}
                {% set dummy = out.append("printer['%s'].%s = %s" % (key1, key2, printer[key1][key2])) %}
            {% endif %}
        {% else %}
            {% if filter_name in key1|lower and filter_value in printer[key1]|string|lower %}
                {% set dummy = out.append("printer['%s'] = %s" % (key1, printer[key1])) %}
            {% endif %}
        {% endfor %}
    {% endfor %}
    
    {action_respond_info(out|join("\n"))}
