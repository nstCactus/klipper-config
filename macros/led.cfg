[gcode_macro _SET_LED_WHITE]
gcode: SET_LED LED=extruder RED=1 GREEN=1 BLUE=1

[gcode_macro _SET_LED_RED]
gcode: SET_LED LED=extruder RED=1 GREEN=0 BLUE=0

[gcode_macro _SET_LED_GREEN]
gcode: SET_LED LED=extruder RED=0 GREEN=1 BLUE=0

[gcode_macro _SET_LED_BLUE]
gcode: SET_LED LED=extruder RED=0 GREEN=0 BLUE=1

[gcode_macro _SET_LED_YELLOW]
gcode: SET_LED LED=extruder RED=1 GREEN=1 BLUE=0

[gcode_macro _SET_LED_SKY_BLUE]
gcode: SET_LED LED=extruder RED=0.078 GREEN=0.568 BLUE=1

[gcode_macro _SET_LED_ORANGE]
gcode: SET_LED LED=extruder RED=1 GREEN=0.5 BLUE=0

[gcode_macro _SET_LED_PINK]
gcode: SET_LED LED=extruder RED=1 GREEN=0.2 BLUE=0.6

[gcode_macro _SET_LED_PURPLE]
gcode: SET_LED LED=extruder RED=0.6 GREEN=0 BLUE=1
