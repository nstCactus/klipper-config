[force_move]
enable_force_move: True

[delayed_gcode KINEMATIC_POSITION]
initial_duration:0.2
gcode:
      SET_KINEMATIC_POSITION X=0
      SET_KINEMATIC_POSITION Y=0
      SET_KINEMATIC_POSITION Z=0

[respond]
default_type: echo

[gcode_macro G31]
gcode:
      RUN_SHELL_COMMAND CMD=clear_plr

[gcode_shell_command clear_plr]
command: sh /home/pi/printer_data/plr/clear_plr.sh
timeout: 5.

[gcode_macro save_last_file]
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set filepath=printer.virtual_sdcard.file_path %}
  {% set filename=filepath.split('/')%}

  SAVE_VARIABLE VARIABLE=last_file VALUE='"{ filename[-1] }"'
  SAVE_VARIABLE VARIABLE=filepath VALUE='"{ printer.virtual_sdcard.file_path }"'

  M118 Last File: { filename[-1] }

[gcode_macro clear_last_file]
gcode:
  {% set filename='' %}
  {% set filepath='' %}
  SAVE_VARIABLE VARIABLE=last_file VALUE='"{ filename }"'
  SAVE_VARIABLE VARIABLE=filepath VALUE='"{ filepath }"'
  
[gcode_shell_command POWER_LOSS_RESUME]
command: /home/pi/printer_data/plr/plr.sh
timeout: 420.


[gcode_macro RESUME_INTERRUPTED]
gcode:
    SET_GCODE_OFFSET Z=0 MOVE=0

    {% set vars = printer.save_variables.variables %}

    {% set z_height = params.Z_HEIGHT
        |default(vars.power_resume_z if 'power_resume_z' in vars else 0)
        |float %}

    {% set last_file = params.GCODE_FILE
        |default(vars.last_file if 'last_file' in vars else "")
        |string %}

    M118 Resuming {last_file} at Z={z_height}

    # Home X & Y axis (while Z axis is moved out of the way)
    G91
    G1 Z5 F600
    G90
    G28 X Y
    G91
    G1 Z-5 F600
    G90

    # Preheat hotend
    M118 Heating nozzle to 200C
    M109 S200

    RUN_SHELL_COMMAND CMD=POWER_LOSS_RESUME PARAMS="{z_height} \"{last_file}\""
    SDCARD_PRINT_FILE FILENAME=plr/"{last_file}"


[gcode_macro LOG_Z]
gcode:
    {% set z_pos = printer.gcode_move.gcode_position.z %}
    RESPOND MSG="Current Z is {z_pos}"
    SAVE_VARIABLE VARIABLE=power_resume_z VALUE={z_pos}
[save_variables]
filename =/home/pi/printer_data/config/variables.cfg
